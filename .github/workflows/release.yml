name: Release

on:
  push:
    tags:
      - "v*"

# OIDC trusted publishing to npm (no NPM_TOKEN secret needed).
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - name: Upgrade npm (trusted publishing needs >=11.5.1)
        run: npm install -g npm@latest
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run check
      - name: Test
        run: npm test
      - name: Publish
        run: npm publish
